---
layout: default
---

<article class="max-w-3xl mx-auto py-16">
    <header class="text-center mb-16">
        <div class="inline-flex items-center space-x-2 text-blue-500 font-bold text-xs uppercase tracking-widest mb-6">
            <span>Blog</span>
            <span class="w-1 h-1 bg-blue-200 rounded-full"></span>
            <span>{{ page.date | date: "%Y. %m. %d." }}</span>
        </div>
        <h1 class="text-4xl md:text-6xl font-extrabold text-slate-900 leading-tight tracking-tighter mb-8">
            {{ page.title }}
        </h1>
        <div class="w-20 h-1 bg-blue-500 mx-auto rounded-full"></div>
    </header>

    <div class="prose prose-slate lg:prose-xl mx-auto prose-blue prose-img:rounded-[2rem] prose-headings:tracking-tight text-slate-600 leading-relaxed">
        {{ content }}
    </div>

    <div class="mt-20 p-12 bg-slate-900 rounded-[3rem] text-center text-white relative overflow-hidden shadow-2xl">
        <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/20 blur-3xl rounded-full -mr-16 -mt-16"></div>
        <h3 class="text-2xl font-bold mb-4 relative z-10">Hasznos volt a cikk?</h3>
        <p class="text-slate-400 mb-8 max-w-md mx-auto relative z-10 text-sm">Oszd meg másokkal is, vagy nézz körül a receptjeink között további inspirációért!</p>
        <a href="/receptek.html" class="inline-block bg-blue-500 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-600 transition shadow-lg shadow-blue-900/20">Irány a receptek</a>
    </div>
</article>
