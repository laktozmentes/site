---
layout: default
---
<article class="max-w-3xl mx-auto py-12 md:py-24 px-6 post-content">
    <header class="text-center mb-16 md:mb-24">
        <div class="inline-flex items-center p-[1px] rounded-full u-rainbow mb-8 shadow-sm">
            <div class="bg-white px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">
                {{ page.date | date: "%Y. %m. %d." }} • {{ page.categories | first | default: "Bejegyzés" }}
            </div>
        </div>
        
        <h1 class="text-5xl md:text-7xl font-black text-slate-900 leading-[1.1] tracking-tighter mb-12">
            {{ page.title }}
        </h1>

        {% if page.image %}
        <div class="rounded-[2.5rem] md:rounded-[4rem] overflow-hidden aspect-[16/9] shadow-sm border border-slate-100 bg-slate-50">
            <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="w-full h-full object-cover">
        </div>
        {% endif %}
    </header>

    <div class="prose prose-lg prose-slate max-w-none 
                text-slate-600 leading-relaxed
                [&>h2]:text-4xl [&>h2]:font-black [&>h2]:text-slate-900 [&>h2]:tracking-tighter [&>h2]:mt-20 [&>h2]:mb-8
                [&>h3]:text-2xl [&>h3]:font-bold [&>h3]:text-slate-800 [&>h3]:mt-12 [&>h3]:mb-6
                [&>p]:mb-8
                [&>ul]:list-disc [&>ul]:pl-6 [&>ul]:mb-10
                [&>blockquote]:border-none [&>blockquote]:relative [&>blockquote]:p-12 [&>blockquote]:my-16 
                [&>blockquote]:u-rainbow [&>blockquote]:rounded-[3rem] [&>blockquote]:text-slate-900 
                [&>blockquote]:font-bold [&>blockquote]:italic [&>blockquote]:text-2xl [&>blockquote]:tracking-tight">
        
        {{ content }}

    </div>

    <footer class="mt-24 pt-16 border-t border-slate-100">
        <div class="flex flex-col md:flex-row items-center justify-between gap-8 bg-white p-10 rounded-[3rem] border border-slate-50 shadow-sm">
            <div class="text-center md:text-left">
                <h4 class="text-xl font-black text-slate-900 tracking-tight mb-2">Tetszett a tartalom?</h4>
                <p class="text-slate-500 text-sm">Nézz körül a többi szakmai bejegyzésünk között is.</p>
            </div>
            <a href="{{ '/blog.html' | relative_url }}" class="group flex items-center gap-3 bg-slate-900 text-white px-8 py-4 rounded-full font-bold text-sm hover:bg-blue-600 transition-all duration-300 shadow-xl shadow-slate-200">
                Vissza a listához
                <span class="group-hover:translate-x-1 transition-transform">→</span>
            </a>
        </div>
    </footer>
</article>
