---
layout: default
---

<article class="max-w-4xl mx-auto py-20 px-6 bg-white">
    <header class="text-center mb-24">
        <div class="flex items-center justify-center space-x-3 text-blue-500 font-bold text-xs uppercase tracking-[0.2em] mb-8">
            <span>{{ page.date | date: "%Y. %m. %d." }}</span>
            <span class="w-1.5 h-1.5 bg-blue-200 rounded-full"></span>
            <span>{{ page.categories | first | default: "Blog" }}</span>
        </div>
        
        <h1 class="text-5xl md:text-7xl font-[900] text-slate-900 leading-tight tracking-tighter mb-12 font-sans">
            {{ page.title }}
        </h1>

        {% if page.image %}
        <div class="rounded-[3rem] overflow-hidden shadow-2xl aspect-[21/9] border-8 border-white bg-slate-100">
            <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="w-full h-full object-cover">
        </div>
        {% endif %}
    </header>

    <div class="max-w-none text-slate-600 font-sans
                [&>h2]:text-4xl [&>h2]:md:text-5xl [&>h2]:font-[900] [&>h2]:text-slate-900 [&>h2]:mt-24 [&>h2]:mb-10 [&>h2]:tracking-tight [&>h2]:leading-tight
                [&>h3]:text-2xl [&>h3]:font-black [&>h3]:text-slate-900 [&>h3]:mt-16 [&>h3]:mb-6
                [&>p]:text-xl [&>p]:leading-[1.8] [&>p]:mb-10
                [&>ul]:mb-10 [&>ul]:list-disc [&>ul]:pl-8 [&>ul]:text-xl
                [&>li]:mb-4
                [&>blockquote]:my-16 [&>blockquote]:p-10 [&>blockquote]:bg-blue-50/50 [&>blockquote]:rounded-[2.5rem] [&>blockquote]:border-l-8 [&>blockquote]:border-blue-500 [&>blockquote]:italic [&>blockquote]:text-blue-700">
        
        {{ content }}

    </div>

    <footer class="mt-32 pt-16 border-t border-slate-100">
        <div class="bg-blue-600 rounded-[3rem] p-12 text-center text-white shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 blur-[80px] rounded-full -mr-32 -mt-32"></div>
            <h3 class="text-3xl font-black mb-6 relative z-10 tracking-tight">Tetszett az írás?</h3>
            <p class="text-blue-100 text-lg mb-10 max-w-md mx-auto relative z-10 leading-relaxed">
                Remélem, tudtam segíteni! Ha van kérdésed, keress bátran.
            </p>
            <div class="flex justify-center relative z-10">
                <a href="{{ '/blog.html' | relative_url }}" class="bg-white text-blue-600 px-12 py-4 rounded-full font-black text-sm uppercase tracking-widest hover:bg-blue-50 transition-all shadow-xl">
                    Vissza a blogra
                </a>
            </div>
        </div>
    </footer>
</article>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
