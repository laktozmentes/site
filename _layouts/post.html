---
layout: default
---
<article class="max-w-4xl mx-auto py-24 md:py-40 px-8">
    <header class="mb-16 md:mb-24">
        <div class="flex items-center gap-4 mb-8 reveal">
            <span class="font-mono text-[10px] text-blue-600 font-bold uppercase tracking-[0.3em]">
                {{ page.date | date: "%Y. %m. %d." }}
            </span>
            <span class="w-12 h-[1px] bg-slate-200"></span>
            <span class="font-mono text-[10px] text-slate-400 uppercase tracking-[0.3em]">
                {{ page.categories | first | default: "Bejegyzés" }}
            </span>
        </div>
        
        <h1 class="text-5xl md:text-7xl font-bold text-slate-900 leading-tight tracking-tighter mb-16 reveal">
            {{ page.title }}
        </h1>

        {% if page.image %}
        <div class="rounded-2xl overflow-hidden aspect-[21/9] bg-slate-100 reveal shadow-sm">
            <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="w-full h-full object-cover">
        </div>
        {% endif %}
    </header>

    <div class="prose prose-lg prose-slate max-w-none 
                text-slate-600 font-medium leading-relaxed
                hover:prose-a:text-blue-600 prose-a:transition-colors
                [&>h2]:text-4xl [&>h2]:font-bold [&>h2]:tracking-tighter [&>h2]:text-slate-900 [&>h2]:mt-20 [&>h2]:mb-8
                [&>h3]:text-2xl [&>h3]:font-bold [&>h3]:text-slate-800 [&>h3]:mt-12 [&>h3]:mb-6
                [&>blockquote]:border-l-4 [&>blockquote]:border-blue-600 [&>blockquote]:bg-blue-50/50 [&>blockquote]:p-8 [&>blockquote]:rounded-r-2xl [&>blockquote]:italic [&>blockquote]:text-slate-900">
        
        {{ content }}

    </div>

    <footer class="mt-32 pt-16 border-t border-slate-100 flex justify-between items-center">
        <a href="{{ '/blog.html' | relative_url }}" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-blue-600 transition">
            ← Vissza a blogra
        </a>
        <div class="flex gap-4">
            <div class="w-2 h-2 rounded-full bg-blue-600"></div>
            <div class="w-2 h-2 rounded-full bg-slate-200"></div>
            <div class="w-2 h-2 rounded-full bg-slate-200"></div>
        </div>
    </footer>

    <section class="mt-20 border-t border-slate-100 pt-16 reveal">
        <h3 class="font-drama italic text-3xl mb-8">Hozzászólások</h3>
        <script src="https://utteranc.es/client.js"
                repo="laktozmentes/site"
                issue-term="pathname"
                label="komment"
                theme="github-light"
                crossorigin="anonymous"
                async>
        </script>
    </section>
</article>
