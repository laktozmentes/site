---
layout: default
---

<article class="max-w-6xl mx-auto py-12 px-6">
    <header class="mb-16">
        <div class="inline-flex items-center p-[1px] rounded-full u-rainbow mb-6">
            <div class="bg-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">
                Kipróbált Recept
            </div>
        </div>
        
        <h1 class="text-5xl md:text-7xl font-black text-slate-900 leading-[0.9] tracking-tighter mb-8">
            {{ page.title }}
        </h1>

        <div class="flex gap-8 text-[11px] font-bold uppercase tracking-widest text-slate-400">
            <span class="flex items-center gap-2">⏱ {{ page.prep_time | default: "20 perc" }}</span>
            <span class="flex items-center gap-2">🍽 {{ page.servings | default: "2 fő" }}</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
        <aside class="lg:col-span-4">
            <div class="p-[1px] rounded-[2.5rem] u-rainbow shadow-sm">
                <div class="bg-white/90 backdrop-blur-md p-10 rounded-[2.5rem]">
                    <h3 class="text-xs font-black uppercase tracking-[0.2em] mb-8 text-slate-900">Hozzávalók</h3>
                    <div class="prose prose-sm prose-slate 
                                [&>ul]:list-none [&>ul]:pl-0 [&>ul>li]:py-3 [&>ul>li]:border-b [&>ul>li]:border-slate-100">
                        {{ page.ingredients | markdownify }}
                    </div>
                </div>
            </div>
        </aside>

        <div class="lg:col-span-8">
            {% if page.image %}
            <div class="rounded-[3rem] overflow-hidden mb-12 aspect-video bg-slate-100">
                <img src="{{ page.image | relative_url }}" class="w-full h-full object-cover">
            </div>
            {% endif %}

            <h3 class="text-3xl font-black text-slate-900 mb-8 tracking-tight">Elkészítés</h3>
            <div class="prose prose-lg prose-slate max-w-none 
                        [&>ol]:list-decimal [&>ol]:pl-5 [&>ol>li]:mb-8 [&>ol>li]:font-medium [&>ol>li]:text-slate-600">
                {{ content }}
            </div>
        </div>
    </div>
</article>
