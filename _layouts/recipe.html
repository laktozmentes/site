---
layout: default
---
<article class="max-w-6xl mx-auto py-24 md:py-40 px-8">
    <header class="mb-20 reveal text-center md:text-left">
        <span class="font-mono text-[10px] text-blue-600 font-bold uppercase tracking-[0.3em] mb-6 block">Kipróbált Recept</span>
        
        <h1 class="text-5xl md:text-8xl font-bold text-slate-900 leading-tight tracking-tighter mb-12">
            {{ page.title }}
        </h1>

        <div class="flex flex-wrap gap-8 justify-center md:justify-start text-[10px] font-bold uppercase tracking-widest text-slate-400 font-mono">
            <span class="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-lg border border-slate-100 text-slate-600">⏱ {{ page.prep_time | default: "20 perc" }}</span>
            <span class="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-lg border border-slate-100 text-slate-600">🍽 {{ page.servings | default: "2 fő" }}</span>
            <span class="flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-lg border border-blue-100 text-blue-600 italic font-drama lowercase">laktózmentes</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-20">
        <aside class="lg:col-span-4 reveal">
            <div class="bg-white border border-slate-100 p-10 rounded-2xl shadow-sm sticky top-32">
                <h3 class="font-mono text-[10px] font-bold uppercase tracking-widest mb-8 text-blue-600">Hozzávalók</h3>
                <div class="prose prose-sm prose-slate 
                            [&>ul]:list-none [&>ul]:pl-0 [&>ul>li]:py-3 [&>ul>li]:border-b [&>ul>li]:border-slate-50 [&>ul>li]:text-slate-600 font-medium">
                    {{ page.ingredients | markdownify }}
                </div>
            </div>
        </aside>

        <div class="lg:col-span-8 reveal">
            {% if page.image %}
            <div class="rounded-2xl overflow-hidden mb-16 aspect-video bg-slate-100 shadow-sm">
                <img src="{{ page.image | relative_url }}" class="w-full h-full object-cover">
            </div>
            {% endif %}

            <h3 class="text-3xl font-bold text-slate-900 tracking-tighter mb-8 font-drama italic">Elkészítés</h3>
            <div class="prose prose-lg prose-slate max-w-none text-slate-600 leading-relaxed
                        [&>ol]:list-decimal [&>ol]:pl-6 [&>ol>li]:mb-6 [&>ol>li]:pl-2">
                {{ content }}
            </div>
        </div>
    </div>
    
    <section class="mt-20 border-t border-slate-100 pt-16 reveal">
        <h3 class="font-drama italic text-3xl mb-8">Hozzászólások</h3>
        <script src="https://utteranc.es/client.js"
                repo="laktozmentes/site"
                issue-term="pathname"
                label="komment"
                theme="github-light"
                crossorigin="anonymous"
                async>
        </script>
    </section>
    
</article>
