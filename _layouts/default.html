<!DOCTYPE html>
<html lang="hu">
<header class="py-10 bg-white">

        <a href="/" class="text-4xl font-black tracking-tighter text-slate-900 uppercase">
            Laktózmentes <span class="text-blue-500">Blog</span>
        </a>
        <p class="text-slate-400 mt-2 font-medium tracking-widest text-xs uppercase">

        </p>
        <div class="flex justify-center space-x-8 mt-8 text-sm font-bold uppercase tracking-wider text-slate-600">

            <a href="/receptek.html" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-200 pb-1">Receptek</a>

<body class="bg-[#f8fafc] text-slate-800 flex flex-col min-h-screen">

    <header class="py-8">
        <nav class="container mx-auto px-6 flex justify-between items-center">
            <a href="/" class="text-3xl font-extrabold tracking-tight text-slate-900 border-b-4 border-blue-100">

            </a>
            <div class="flex space-x-10 text-sm font-semibold uppercase tracking-widest">
