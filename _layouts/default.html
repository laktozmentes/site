<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Laktózmentes Blog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=DM+Serif+Display:italic&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand-blue: #2563EB; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .font-drama { font-family: 'DM Serif Display', serif; }
        .font-mono { font-family: 'Space Mono', monospace; }
        
        /* Noise Overlay */
        .noise::before {
            content: "";
            position: fixed; inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='n'%3BfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3B%3B%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.04; z-index: 9999; pointer-events: none;
        }
    </style>
</head>
<body class="noise antialiased">

    <nav id="main-nav" class="fixed top-8 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full flex items-center gap-8 border border-transparent transition-all duration-500">
        <a href="{{ '/' | relative_url }}" class="font-bold tracking-tighter text-xl uppercase italic">
            LAKTÓZMENTES<span class="text-blue-600">.</span>
        </a>
        <div class="hidden md:flex gap-6 text-[10px] font-bold uppercase tracking-[0.2em]">
            <a href="{{ '/blog.html' | relative_url }}" class="hover:text-blue-600 transition">Blog</a>
            <a href="{{ '/receptek.html' | relative_url }}" class="hover:text-blue-600 transition">Receptek</a>
        </div>
        <a href="{{ '/blog.html' | relative_url }}" class="bg-blue-600 text-white px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-tighter hover:scale-105 transition">
            Olvasd a blogot
        </a>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer class="bg-slate-900 text-white rounded-t-[3rem] mt-20 p-12 md:p-24">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between gap-12">
            <h2 class="text-5xl font-bold tracking-tighter italic font-drama">Laktózmentes.</h2>
            <div class="flex flex-col gap-4 text-slate-400 font-mono text-[10px] uppercase tracking-widest">
                <p>&copy; {{ "now" | date: "%Y" }} Minden jog fenntartva.</p>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-400"></div> SYSTEM OPERATIONAL
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            if (window.scrollY > 50) {
                nav.classList.add('bg-white/70', 'backdrop-blur-xl', 'border-blue-100', 'shadow-lg');
            } else {
                nav.classList.remove('bg-white/70', 'backdrop-blur-xl', 'border-blue-100', 'shadow-lg');
            }
        });

        // Basic animations
        gsap.from(".reveal", { 
            y: 50, opacity: 0, duration: 1, stagger: 0.2, ease: "power4.out", scrollTrigger: ".reveal" 
        });
    </script>
</body>
</html>
