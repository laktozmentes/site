<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Laktózmentes Blog</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=DM+Serif+Display:italic&family=Space+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --brand-blue: #2563EB; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f8fafc; color: #0f172a; scroll-behavior: smooth; }
        .font-drama { font-family: 'DM Serif Display', serif; }
        .font-mono { font-family: 'Space Mono', monospace; }
        
        /* Finom zaj-overlay a textúráért */
        .noise::before {
            content: "";
            position: fixed; inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3B%3Cfilter id='n'%3B%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3B%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.04; z-index: 9999; pointer-events: none;
        }
    </style>
</head>
<body class="noise antialiased min-h-screen flex flex-col">

    <nav id="main-nav" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 px-8 py-4 rounded-xl flex items-center gap-10 transition-all duration-500 w-[95%] md:w-auto border border-transparent bg-white/90 backdrop-blur-md shadow-sm">
    
        <a href="{{ '/' | relative_url }}" class="font-bold tracking-tighter text-xl uppercase italic hover:opacity-80 transition">
            LM<span class="text-blue-600">.</span>
        </a>
    
        <div class="flex gap-8 text-[10px] font-bold uppercase tracking-[0.2em]">
            <a href="{{ '/' | relative_url }}" class="hover:text-blue-600 transition {% if page.url == '/' or page.url == '/index.html' %}text-blue-600 font-black{% endif %}">Home</a>
            
            <a href="{{ '/blog' | relative_url }}" class="hover:text-blue-600 transition {% if page.url contains 'blog' %}text-blue-600 font-black{% endif %}">Blog</a>
            
            <a href="{{ '/receptek' | relative_url }}" class="hover:text-blue-600 transition {% if page.url contains 'receptek' %}text-blue-600 font-black{% endif %}">Receptek</a>
        </div>
    
    </nav>

    <main class="flex-grow">
        {{ content }}
    </main>

    <footer class="bg-slate-900 text-white p-12 md:p-24">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12">
            <div class="text-center md:text-left">
                <h2 class="text-4xl font-bold tracking-tighter italic font-drama">Laktózmentes Blog</h2>
                <p class="text-slate-400 text-sm mt-2">Az élet laktózmentes oldala.</p>
            </div>
            <div class="flex flex-col items-center md:items-end gap-4 text-slate-400 font-mono text-[10px] uppercase tracking-widest">
                <p>&copy; {{ "now" | date: "%Y" }} Minden jog fenntartva.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        // Navigáció görgetési effekt
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            if (window.scrollY > 50) {
                nav.classList.add('bg-white/80', 'backdrop-blur-xl', 'border', 'border-blue-100', 'shadow-xl');
            } else {
                nav.classList.remove('bg-white/80', 'backdrop-blur-xl', 'border', 'border-blue-100', 'shadow-xl');
            }
        });

        // Megjelenési animációk
        gsap.registerPlugin(ScrollTrigger);
        gsap.from(".reveal", { 
            y: 40, opacity: 0, duration: 1, stagger: 0.15, ease: "power3.out",
            scrollTrigger: { trigger: ".reveal", start: "top 85%" }
        });
    </script>
</body>
</html>
