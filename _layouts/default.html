<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Laktózmentes Blog</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TGZTNZTJDW');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-100 shadow-sm">
        <div class="container mx-auto px-6 py-10 text-center">
            <a href="/" class="inline-block group">
                <h1 class="text-4xl font-black tracking-tighter text-slate-900 uppercase transition group-hover:text-blue-600">
                    Laktózmentes <span class="text-blue-500">Blog</span>
                </h1>
                <p class="text-slate-400 mt-2 font-medium tracking-[0.3em] text-[10px] uppercase">
                    Az élet laktózmentes oldala
                </p>
            </a>
            
            <nav class="flex justify-center space-x-10 mt-8 text-sm font-bold uppercase tracking-widest text-slate-600">
                <a href="{{ '/blog/' | relative_url }}" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-200 pb-1">Blog</a>
                <a href="{{ '/receptek/' | relative_url }}" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-200 pb-1">Receptek</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 flex-grow">
        {{ content }}
    </main>

    <footer class="bg-white border-t border-slate-100 py-12 mt-auto">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-center md:text-left gap-4">
            <div>
                <p class="text-slate-900 font-bold tracking-tight uppercase">Laktózmentes Blog</p>
                <p class="text-slate-400 text-xs italic mt-1">Élj teljes életet korlátok nélkül.</p>
            </div>
            <p class="text-slate-400 font-bold tracking-widest text-[10px] uppercase">
                &copy; {{ "now" | date: "%Y" }} Minden jog fenntartva.
            </p>
        </div>
    </footer>

</body>
</html>
