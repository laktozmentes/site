<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Laktózmentes Élet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 flex flex-col min-h-screen">

    <header class="py-8">
        <nav class="container mx-auto px-6 flex justify-between items-center">
            <a href="/" class="text-3xl font-extrabold tracking-tight text-slate-900 border-b-4 border-blue-100">
                Mentes<span class="text-blue-500">Blog.</span>
            </a>
            <div class="flex space-x-10 text-sm font-semibold uppercase tracking-widest">
                <a href="/blog.html" class="hover:text-blue-500 transition">Tudnivalók</a>
                <a href="/receptek.html" class="hover:text-blue-500 transition">Receptek</a>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 flex-grow">
        {{ content }}
    </main>

    <footer class="py-12 mt-20 border-t border-slate-200">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center">
            <p class="text-slate-400 text-sm italic">„Az egészség a konyhában kezdődik.”</p>
            <p class="text-slate-500 font-bold tracking-widest text-xs mt-4 md:mt-0 uppercase">&copy; {{ "now" | date: "%Y" }} Laktózmentes Élet</p>
        </div>
    </footer>

</body>
</html>
