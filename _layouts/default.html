<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>{{ page.title }} | Laktózmentes Blog</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TGZTNZTJDW');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen flex flex-col antialiased">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <a href="{{ '/' | relative_url }}" class="flex items-center gap-2">
                <span class="text-xl font-black tracking-tighter text-slate-900 uppercase">
                    Laktózmentes <span class="text-blue-500">Blog</span>
                </span>
            </a>
            
            <nav class="flex gap-4 text-[11px] font-extrabold uppercase tracking-widest text-slate-500">
                <a href="{{ '/blog.html' | relative_url }}" class="hover:text-blue-600 transition py-2">Blog</a>
                <a href="{{ '/receptek.html' | relative_url }}" class="hover:text-blue-600 transition py-2">Receptek</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        {{ content }}
    </main>

    <footer class="bg-white border-t border-slate-100 py-10 mt-auto">
        <div class="container mx-auto px-6 text-center">
            <p class="text-slate-900 font-bold tracking-tight uppercase text-sm">Laktózmentes Blog</p>
            <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase mt-4">
                &copy; {{ "now" | date: "%Y" }} Minden jog fenntartva.
            </p>
        </div>
    </footer>
</body>
</html>
