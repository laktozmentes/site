<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>{{ page.title }} | Laktózmentes Blog</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TGZTNZTJDW');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    
    /* The Popcorn "Rainbow" Gradient */
    .u-rainbow {
        background-image: conic-gradient(
            from 180deg at 50% 50%,
            #ebf6f2 0deg, #e7f3e0 56.3deg, #e5eff8 118.8deg, 
            #fef1d8 176.4deg, #f7f4fa 237.6deg, #f7dbe5 295.2deg, #ebf6f2 360deg
        );
    }

    /* Soft Glass Effect for cards */
    .popcorn-card {
        background: white;
        border: 1px solid #f1f5f9;
        transition: transform 0.3s ease, shadow 0.3s ease;
    }
    .popcorn-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.03);
    }
</style>
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen flex flex-col antialiased">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            
            <a href="{{ '/' | relative_url }}" class="group flex flex-col">
                <span class="text-xl font-black tracking-tighter text-slate-900 uppercase transition group-hover:text-blue-600">
                    Laktózmentes <span class="text-blue-500">Blog</span>
                </span>
                <span class="text-[8px] font-bold tracking-[0.2em] text-slate-400 uppercase leading-none mt-1">
                    Az élet laktózmentes oldala
                </span>
            </a>
            
            <nav class="flex items-center space-x-8 text-[11px] font-black uppercase tracking-widest text-slate-600">
                <a href="{{ '/' | relative_url }}" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-200 pb-1 flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Főoldal
                </a>
                <a href="{{ '/blog.html' | relative_url }}" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-200 pb-1">
                    Blog
                </a>
                <a href="{{ '/receptek.html' | relative_url }}" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-200 pb-1">
                    Receptek
                </a>
            </nav>

        </div>
    </header>

    <main class="container mx-auto px-6 py-12 flex-grow">
        {{ content }}
    </main>

    <footer class="bg-white border-t border-slate-100 py-12 mt-auto">
        <div class="container mx-auto px-6 text-center">
            <p class="text-slate-900 font-bold tracking-tight uppercase text-sm">Laktózmentes Blog</p>
            <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase mt-4">
                &copy; {{ "now" | date: "%Y" }} Minden jog fenntartva.
            </p>
        </div>
    </footer>
</body>
</html>
