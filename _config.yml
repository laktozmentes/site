# Weboldal alapadatai
title: "Laktózmentes Blog"
description: "Szakmai tanácsok, adózási infók és isteni receptek a laktózmentes élethez."
url: "https://laktozmentes.github.io"
baseurl: "/site" 

# SEO és Social Media (A jekyll-seo-tag-hez)
author: "Tamas Szabo" # Itt add meg a neved
social:
  name: "Laktózmentes Blog"
  links:
    - https://www.facebook.com/laktozmentes # Ha van ilyen

# Gyűjtemények
collections:
  recipes:
    output: true
    permalink: /receptek/:title/ # Itt is a :title-t javaslom a :path helyett a tisztább URL-ért

# URL szerkezet a posztoknak
permalink: /blog/:title/

# Markdown és Szövegfeldolgozás
markdown: kramdown
highlighter: rouge

# KIVONAT KEZELÉSE (Fontos!)
# A posztban használd az jelölőt ott, ahol el akarod vágni a szöveget a főoldalon.
excerpt_separator: ""

# Webhely felépítése
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "recipes"
    values:
      layout: "post" # Ha a receptekhez is a post sablont használod, amit javítottunk

# Kizárások
exclude:
  - node_modules
  - tailwind.config.js
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - .github
  - README.md

# Pluginok
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
